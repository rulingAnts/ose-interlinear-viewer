<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneStory Interlinearizer</title>
  <link rel="stylesheet" href="./styles.css">
  <script>
    function navigateTo(newURL) {
      window.location.href = newURL;
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => reg.update())
          .catch(err => console.warn('Service worker registration failed:', err));
      });
    }
  </script>
</head>
<body>
  <div class="container">
    <div id="browserWarning" class="browser-warning"></div>

    <div class="card">
      <div class="app-logo">SIL &mdash; OneStory Editor</div>
      <h1 class="app-title">Story Interlinearizer</h1>
      <p class="app-description">
        Open a <code>.onestory</code> project file and export any story
        as an interlinear back-translation document.
      </p>

      <p style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:10px;">
        Choose export format
      </p>

      <div class="format-menu">
        <button class="btn-format" onclick="navigateTo('./xlingpaper.html')">
          <span class="btn-format-icon">📄</span>
          <span class="btn-format-text">
            <span class="btn-format-name">XLingPaper</span>
            <span class="btn-format-desc">Exports an XML file for use in XLingPaper — ideal for formal linguistic publishing</span>
          </span>
          <span class="btn-format-arrow">›</span>
        </button>

        <button class="btn-format" onclick="navigateTo('./html.html')">
          <span class="btn-format-icon">🌐</span>
          <span class="btn-format-text">
            <span class="btn-format-name">Web Page</span>
            <span class="btn-format-desc">Opens the interlinear story in a new browser tab — no extra software needed</span>
          </span>
          <span class="btn-format-arrow">›</span>
        </button>

        <button class="btn-format" onclick="navigateTo('./tsv.html')">
          <span class="btn-format-icon">📊</span>
          <span class="btn-format-text">
            <span class="btn-format-name">Spreadsheet-Compatible Text</span>
            <span class="btn-format-desc">Tab-separated (.tsv) — opens in Excel, Google Sheets, or any text editor</span>
          </span>
          <span class="btn-format-arrow">›</span>
        </button>
      </div>
    </div>

    <div class="app-message" id="message"></div>
  </div>

  <script>
    function isSupportedBrowser() {
      if (navigator.userAgentData && navigator.userAgentData.brands) {
        return navigator.userAgentData.brands.some(b =>
          ["Google Chrome", "Microsoft Edge", "Apple", "Chromium"].includes(b.brand)
        );
      }
      const ua = navigator.userAgent.toLowerCase();
      return ua.includes("edg") || ua.includes("chrome") || ua.includes("safari")
          || ua.includes("chromium") || ua.includes("applewebkit");
    }

    function isElectron() {
      if (navigator.userAgentData && navigator.userAgentData.brands) {
        return navigator.userAgentData.brands.some(b => b.brand === "Chromium")
            && !navigator.userAgentData.brands.some(b =>
                ["Google Chrome", "Microsoft Edge"].includes(b.brand));
      }
      return navigator.userAgent.toLowerCase().includes("electron");
    }

    const warning = document.getElementById('browserWarning');
    const message = document.getElementById('message');

    if (!isSupportedBrowser()) {
      warning.innerHTML = 'Unsupported browser detected. Please use Chrome, Edge, or Safari — or <a href="https://github.com/rulingAnts/ose-interlinear-viewer/releases/latest">download the Windows app</a>.';
      alert("This app requires Chrome, Edge, or Safari. You will be redirected to the download page.");
      window.location.href = "https://github.com/rulingAnts/ose-interlinear-viewer/releases/latest";
    } else if (isElectron()) {
      message.innerHTML = 'Running as desktop app. <a href="https://github.com/rulingAnts/ose-interlinear-viewer/releases/latest">Check for updates</a>.';
    } else {
      message.innerHTML = 'Web version &mdash; may include experimental changes. Stable <a href="https://github.com/rulingAnts/ose-interlinear-viewer/releases/latest">Windows desktop app here</a>.';
    }
  </script>
</body>
</html>
